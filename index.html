<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moco Moco</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&family=Gochi+Hand&display=swap" rel="stylesheet">
  <link rel="icon" href="img/logo_moco.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay" id="overlay"></div>

<!-- ─── HEADER ─── -->
<header class="top-header">
  <div class="logo-box">
    <img src="img/logo_moco.png" alt="Moco Moco">
    <span>MOCO MOCO</span>
  </div>

  <nav class="nav-links" id="nav-links">
    <a href="#" data-section="home">Home</a>
    <a href="#" data-section="listas">Listas</a>
    <a href="#" data-section="sobre">Sobre</a>
    <a id="login-btn">Entrar</a>
    <a id="logout-btn" style="display:none">Salir</a>
  </nav>

  <button class="hamburger" id="hamburger" aria-label="Menú">
    <svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
      <line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/>
    </svg>
  </button>
</header>

<!-- ─── MAIN ─── -->
<main>

  <!-- HOME -->
  <section id="home" class="section active">

    <!-- Mascota -->
    <div class="mascota-zone">
      <div class="mascota-wrap">
        <div class="mascota-bubble" id="mascota-bubble"></div>
        <img class="mascota-img floating" id="mascota-img" src="img/flan.png" alt="mascota">
      </div>
    </div>

    <!-- Lista card -->
    <div class="list-card">

      <div class="list-header">
        <span id="active-title">Cargando...</span>
      </div>

      <!-- Barra progreso -->
      <div class="progreso-container">
        <div class="progreso-track">
          <div class="progreso-bar" id="progreso-bar"></div>
        </div>
        <span class="progreso-texto" id="progreso-texto"></span>
      </div>

      <!-- Items -->
      <div class="list-content" id="lista-html"></div>

      <!-- Input -->
      <div class="input-area">
        <input
          type="text"
          id="input-item"
          placeholder="leche, tomate x2, ramen..."
          autocomplete="off"
        >
        <button class="send-btn" id="btn-add">OK</button>
      </div>

    </div>
  </section>

  <!-- LISTAS -->
  <section id="listas" class="section">
    <h2>Mis Listas</h2>
    <div class="grid-listas" id="grid-listas"></div>
    <button class="btn-full" id="btn-nueva-lista">+ Nueva Lista</button>
  </section>

  <!-- SOBRE -->
  <section id="sobre" class="section">
    <img src="img/macaron.png" class="sobre-mascota" alt="mascota">
    <h2>MOCO MOCO</h2>
    <p>organiza tus compras con estilo</p>
    <p style="font-size:14px; margin-top:8px; opacity:0.65">hecho con mucho cariño y bastante ramen</p>
    <div style="margin-top:18px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center">
      <span class="sobre-tag">Firebase</span>
      <span class="sobre-tag">Pixelify Sans</span>
      <span class="sobre-tag">Gochi Hand</span>
      <span class="sobre-tag">pixel art</span>
      <span class="sobre-tag">cozy vibes</span>
    </div>
  </section>

</main>

<!-- ─── BOTTOM NAV (mobile) ─── -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="#" data-section="home" class="active-nav">
      <span class="nav-icon">
        <svg viewBox="0 0 16 16" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter">
          <path d="M1 8L8 2L15 8"/><path d="M4 8L4 14L7 14L7 10L9 10L9 14L12 14L12 8"/>
        </svg>
      </span>
      <span>Inicio</span>
    </a>
    <a href="#" data-section="listas">
      <span class="nav-icon">
        <svg viewBox="0 0 16 16" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
          <rect x="2" y="2" width="12" height="12"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="11" y2="9"/><line x1="5" y1="12" x2="9" y2="12"/>
        </svg>
      </span>
      <span>Listas</span>
    </a>
    <a href="#" data-section="sobre">
      <span class="nav-icon">
        <svg viewBox="0 0 16 16" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
          <rect x="2" y="2" width="12" height="12" rx="1"/><line x1="8" y1="7" x2="8" y2="12"/><rect x="7.25" y="4" width="1.5" height="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </span>
      <span>Sobre</span>
    </a>
  </div>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
